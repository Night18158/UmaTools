    <script>
      (function () {
        try {
          var pref = localStorage.getItem("umasearch-darkmode");
          var dark = pref
            ? pref === "dark"
            : window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches;
          var root = document.documentElement;
          root.classList.add("is-loading");
          root.classList.toggle("dark", dark);
          root.style.colorScheme = dark ? "dark" : "light";

          var pageLoaded = false;
          var navReady = !document.querySelector('script[src="/js/nav.js"]');
          var release = function () {
            root.classList.remove("is-loading");
          };
          var tryRelease = function () {
            if (!pageLoaded || !navReady) return;
            if (document.fonts && document.fonts.ready) {
              Promise.race([
                document.fonts.ready,
                new Promise(function (resolve) {
                  setTimeout(resolve, 1200);
                })
              ]).then(function () {
                requestAnimationFrame(release);
              });
            } else {
              requestAnimationFrame(release);
            }
          };
          window.addEventListener("load", function () {
            pageLoaded = true;
            tryRelease();
          });
          window.addEventListener("nav:ready", function () {
            navReady = true;
            tryRelease();
          });
          window.setTimeout(function () {
            pageLoaded = true;
            navReady = true;
            tryRelease();
          }, 2400);
        } catch (e) {}
      })();
    </script>

    <main id="main" class="container">

      <p class="subtle">
        Build your 6-card support deck, set each card's limit break level, and

      <datalist id="cardList"></datalist>

      <div class="deck-actions">

      <!-- Combined hints (shown when all 6 slots filled) -->

        <h3>Combined Hint Skills</h3>
        <div id="combined-hints-list" class="combined-hints-list"></div>
      </div>

      <!-- LB comparison table -->
      <div id="lb-compare-section" class="lb-compare-section" style="display:none">
