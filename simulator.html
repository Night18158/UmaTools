  <body>
    <script>
      (function () {
        try {
          var pref = localStorage.getItem("umasearch-darkmode");
          var dark = pref
            ? pref === "dark"
            : window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches;
          var root = document.documentElement;
          root.classList.add("is-loading");
          root.classList.toggle("dark", dark);
          root.style.colorScheme = dark ? "dark" : "light";

          var pageLoaded = false;
          var navReady = !document.querySelector('script[src="/js/nav.js"]');
          var release = function () {
            root.classList.remove("is-loading");
          };
          var tryRelease = function () {
            if (!pageLoaded || !navReady) return;
            if (document.fonts && document.fonts.ready) {
              Promise.race([
                document.fonts.ready,
                new Promise(function (resolve) {
                  setTimeout(resolve, 1200);
                })
              ]).then(function () {
                requestAnimationFrame(release);
              });
            } else {
              requestAnimationFrame(release);
            }
          };
          window.addEventListener("load", function () {
            pageLoaded = true;
            tryRelease();
          });
          window.addEventListener("nav:ready", function () {
            navReady = true;
            tryRelease();
          });
          window.setTimeout(function () {
            pageLoaded = true;
            navReady = true;
            tryRelease();
          }, 2400);
        } catch (e) {}
      })();
    </script>

    <main id="main" class="container">
      <h1>Stat Simulator</h1>

      <div class="sim-grid">
        <section class="card card-elevated sim-conditions">
          <h2>Current Stats</h2>
          <div class="rating-grid sim-stat-inputs" id="simStatInputs">
            <label>Speed <input type="number" id="simSpeed" min="0" max="2000" value="600" /></label>
            <label>Stamina <input type="number" id="simStamina" min="0" max="2000" value="400" /></label>
            <label>Power <input type="number" id="simPower" min="0" max="2000" value="500" /></label>
            <label>Guts <input type="number" id="simGuts" min="0" max="2000" value="300" /></label>
            <label>Wisdom <input type="number" id="simWisdom" min="0" max="2000" value="400" /></label>
          </div>

          <h2 style="margin-top:16px">Training Conditions</h2>
          <div class="sim-conditions-grid">
            <label class="sim-cond-label">Motivation
              <select id="simMotivation">
                <option value="1.2">Great (+20%)</option>
                <option value="1.1">Good (+10%)</option>
                <option value="1.0" selected>Normal (0%)</option>
                <option value="0.9">Bad (−10%)</option>
                <option value="0.8">Awful (−20%)</option>
              </select>
            </label>
            <label class="sim-cond-label">Training Level
              <select id="simLevel">
                <option value="1" selected>Level 1</option>
                <option value="2">Level 2</option>
                <option value="3">Level 3</option>
                <option value="4">Level 4</option>
                <option value="5">Level 5</option>
              </select>
            </label>
            <label class="sim-cond-label">Support Cards Present
              <input type="number" id="simSupportCards" min="0" max="6" value="1" />
            </label>
            <label class="sim-cond-label">Energy (%)
              <input type="number" id="simEnergy" min="0" max="100" value="80" />
            </label>
          </div>
          <div class="sim-checkboxes">
            <label class="target-check">
              <input type="checkbox" id="simFriendship" />
              Friendship training active
            </label>
            <label class="target-check">
              <input type="checkbox" id="simAoharu" />
              Aoharu training
            </label>
            <label class="target-check">
              <input type="checkbox" id="simExplosion" />
              Aoharu Explosion
            </label>
          </div>
        </section>

        <section class="card card-elevated sim-results-panel">
          <h2>Training Type</h2>
          <div class="sim-type-buttons">
            <button class="sim-type-btn active" data-type="speed" style="--t-color:#3b82f6">Speed</button>
            <button class="sim-type-btn" data-type="stamina" style="--t-color:#f97316">Stamina</button>
            <button class="sim-type-btn" data-type="power" style="--t-color:#ef4444">Power</button>
            <button class="sim-type-btn" data-type="guts" style="--t-color:#eab308">Guts</button>
            <button class="sim-type-btn" data-type="wisdom" style="--t-color:#22c55e">Wisdom</button>
          </div>

          <div class="sim-result" id="simResult"></div>

          <div class="sim-failure">
            <h3>Failure Risk</h3>
            <div class="sim-failure-bar-wrap">
              <div class="sim-failure-bar" id="simFailureBar"></div>
            </div>
            <div id="simFailureText" class="sim-failure-text"></div>
          </div>
        </section>
      </div>

      <section class="card card-elevated sim-compare-section">
        <h2>Compare All Training Types</h2>
        <div class="sim-compare-grid" id="simCompareGrid"></div>
      </section>
